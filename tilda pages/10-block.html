<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body, html { margin: 0; padding: 0; }

/* КНОПКА ТЕМЫ */
#theme-btn { position: fixed; top: 20px; right: 20px; z-index: 99999; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; color: #fff; transition: 0.3s; outline: none; }
#theme-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
body.light-mode #theme-btn { background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(0, 0, 0, 0.1); color: #333; }

/* ФОН (Самый нижний) */
#dna-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; z-index: -10; overflow: hidden; transition: background 0.8s ease; background: radial-gradient(circle at center, #1f1f1f 0%, #000000 100%); }
body.light-mode #dna-wrapper { background: radial-gradient(circle at center, #ffffff 0%, #dcdcdc 100%); }

/* ШУМ */
.noise-overlay { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; opacity: 0.08; pointer-events: none; animation: noise-anim 0.2s infinite; z-index: -9; transition: filter 0.5s ease; filter: invert(1); }
body.light-mode .noise-overlay { filter: none; }

/* 3D */
#dna-canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -8; }

/* ФОКУС (ТОЛЬКО НА ФОНЕ) */
/* z-index: -5, чтобы быть выше ДНК, но ниже контента сайта (z-index: 0+) */
#focus-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -5; pointer-events: none; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); -webkit-mask-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), transparent 120px, black 500px); mask-image: radial-gradient(circle at var(--x, 50%) var(--y, 50%), transparent 120px, black 500px); }

@keyframes noise-anim { 0% { transform: translate(0, 0); } 10% { transform: translate(-5%, -5%); } 50% { transform: translate(-10%, 5%); } 100% { transform: translate(5%, 0); } }

/* МОБИЛЬНАЯ ВЕРСИЯ */
@media (max-width: 768px) { 
    #dna-wrapper { opacity: 1; background: radial-gradient(circle at center, #2a2a2a 0%, #000000 100%); } 
    /* В светлой теме на мобильном убираем темный градиент */
    body.light-mode #dna-wrapper { background: radial-gradient(circle at center, #ffffff 0%, #dcdcdc 100%); } 
    #focus-layer { --x: 50%; --y: 50%; backdrop-filter: blur(3px); } 
    #theme-btn { top: 10px; right: 10px; padding: 8px 15px; font-size: 12px; } 
}
</style>

<button id="theme-btn">Light Mode</button>
<div id="dna-wrapper"><div id="noise-layer" class="noise-overlay"></div><div id="dna-canvas-container"></div><div id="focus-layer"></div></div>

<!-- Убрали принудительный спейсер, высота будет зависеть от контента -->

<script>
document.addEventListener("DOMContentLoaded", function() {
    var THEMES = {
        light: { name: 'Light', fogColor: 0xffffff, colorDots: 0x00aaff, colorLines: 0xaaaaaa, linesOpacity: 0.2, btnText: 'Dark Mode' },
        dark: { name: 'Dark', fogColor: 0x1f1f1f, colorDots: 0x00ffff, colorLines: 0x888888, linesOpacity: 0.15, btnText: 'Light Mode' }
    };
    var currentTheme = 'dark';
    var scene, camera, renderer, dnaGroup, materialDots, materialLines;
    
    // CONFIG: scrollScreens убран, будем считать динамически
    var CONFIG = { dnaLength: 140, dnaRadius: 5, particles: 100, camStartZ: 35, camEndZ: 5, camStartY: 0, camEndY: -20, autoSpeed: 0.002, scrollRotateMult: 3, fogDensity: 0.02 };
    
    var container = document.getElementById('dna-canvas-container');
    var noiseLayer = document.getElementById('noise-layer');
    var themeBtn = document.getElementById('theme-btn');
    var autoRotateAngle = 0;

    var c = document.createElement('canvas'); c.width = 200; c.height = 200; var ctx = c.getContext('2d');
    for (var x = 0; c.width > x; x += 2) { for (var y = 0; c.height > y; y += 2) { if (Math.random() > 0.5) { ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(x, y, 1, 1); } } }
    noiseLayer.style.backgroundImage = 'url(' + c.toDataURL() + ')';

    initThreeJS();
    animate();
    
    var focusLayer = document.getElementById('focus-layer');
    focusLayer.style.setProperty('--x', '50%'); focusLayer.style.setProperty('--y', '50%');
    document.addEventListener('mousemove', function(e) { focusLayer.style.setProperty('--x', e.clientX + 'px'); focusLayer.style.setProperty('--y', e.clientY + 'px'); });

    themeBtn.addEventListener('click', function() {
        if (currentTheme == 'dark') { currentTheme = 'light'; } else { currentTheme = 'dark'; }
        var theme = THEMES[currentTheme];
        document.body.classList.toggle('light-mode');
        themeBtn.innerText = theme.btnText;
        if (scene && scene.fog) { scene.fog.color.setHex(theme.fogColor); }
        if (materialDots) materialDots.color.setHex(theme.colorDots);
        if (materialLines) { materialLines.color.setHex(theme.colorLines); materialLines.opacity = theme.linesOpacity; }
    });

    function initThreeJS() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(THEMES[currentTheme].fogColor, CONFIG.fogDensity);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        createDNA();
        window.addEventListener('resize', function() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    }

    function createDNA() {
        dnaGroup = new THREE.Group();
        scene.add(dnaGroup);
        var sphereGeo = new THREE.SphereGeometry(0.25, 8, 8);
        materialDots = new THREE.MeshBasicMaterial({ color: THEMES[currentTheme].colorDots });
        materialLines = new THREE.LineBasicMaterial({ color: THEMES[currentTheme].colorLines, transparent: true, opacity: THEMES[currentTheme].linesOpacity });

        for (var i = 0; CONFIG.particles > i; i++) {
            var t = i / CONFIG.particles;
            var angle = t * Math.PI * 14; 
            var y = (t - 0.5) * CONFIG.dnaLength; 
            var x1 = Math.cos(angle) * CONFIG.dnaRadius;
            var z1 = Math.sin(angle) * CONFIG.dnaRadius;
            var x2 = Math.cos(angle + Math.PI) * CONFIG.dnaRadius;
            var z2 = Math.sin(angle + Math.PI) * CONFIG.dnaRadius;

            var n1 = new THREE.Mesh(sphereGeo, materialDots); n1.position.set(x1, y, z1);
            var n2 = new THREE.Mesh(sphereGeo, materialDots); n2.position.set(x2, y, z2);
            dnaGroup.add(n1); dnaGroup.add(n2);

            var points = [new THREE.Vector3(x1, y, z1), new THREE.Vector3(x2, y, z2)];
            var lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            var line = new THREE.Line(lineGeo, materialLines);
            dnaGroup.add(line);
        }
        dnaGroup.rotation.z = 0.5;
    }

    function animate() {
        requestAnimationFrame(animate);
        var scrollY = window.scrollY || window.pageYOffset;
        
        // ДИНАМИЧЕСКИЙ РАСЧЕТ ВЫСОТЫ
        // Берем полную высоту страницы минус один экран (так как в начале скролл 0)
        var totalScrollableHeight = document.body.scrollHeight - window.innerHeight;
        // Если контента мало, ставим минимальный порог (например, 2000px)
        if (totalScrollableHeight < 2000) totalScrollableHeight = 2000;

        var progress = scrollY / totalScrollableHeight;
        if (progress > 1) progress = 1;

        camera.position.z = CONFIG.camStartZ + (CONFIG.camEndZ - CONFIG.camStartZ) * progress;
        camera.position.y = CONFIG.camStartY + (CONFIG.camEndY - CONFIG.camStartY) * progress;
        autoRotateAngle += CONFIG.autoSpeed;
        dnaGroup.rotation.y = autoRotateAngle + (progress * Math.PI * CONFIG.scrollRotateMult);
        renderer.render(scene, camera);
    }
});
</script>
