.news-popup-overlay{

  display:none; align-items:center; justify-content:center;

}

.news-popup-content{

}
.news-popup-overlay.open .news-popup-content{ transform:scale(1); }

body.light-mode .news-popup-content{

}

}
body.light-mode .popup-close svg{ color:#222; }

/* BODY */
.popup-body{

}
.popup-date{

body.light-mode .popup-title{ color:#222; }

<script>
(function () {
  feather.replace();

  function initTildaFormsIn(node) {
    // правила/валидация/маски
    if (window.tildaForm) { try { window.tildaForm.init(node); } catch(e) {} }

    // попап-сабмит/успех (если подключен)
    if (window.t702_initPopup) { try { window.t702_initPopup(); } catch(e) {} }

    // общий рескан форм tilda
    if (window.t_onFuncLoad) {
      try {
        window.t_onFuncLoad('t_forms__init', function () {
          if (window.t_forms__init) window.t_forms__init(node);
        });
      } catch(e) {}
    }
  }

  window.nqInitPopupForm = function () {
    var popup = document.getElementById('news-popup');
    if (!popup) return;
    initTildaFormsIn(popup);
  };

  window.openNews = function () {
    document.getElementById('popup-img').src =
      "https://static.tildacdn.com/tild3764-3466-4863-a430-633239663238/d1dca196-bcc0-4c27-b.png";
    document.getElementById('popup-date').innerText = "Заявка";
    document.getElementById('popup-title').innerText = "Оставить заявку";
    document.getElementById('popup-text').innerHTML = "<p>Оставьте контакты — мы свяжемся с вами.</p>";

    document.getElementById('news-popup').classList.add('open');
    document.body.style.overflow = 'hidden';

    // ВАЖНО: инициализация tilda-формы сразу после открытия
    if (window.nqInitPopupForm) setTimeout(window.nqInitPopupForm, 0);

    feather.replace();
  };

  window.closeNews = function () {
    document.getElementById('news-popup').classList.remove('open');
    document.body.style.overflow = '';
  };

  document.getElementById('news-popup').addEventListener('click', function (e) {
    if (e.target === this) window.closeNews();
  });
})();
</script>
