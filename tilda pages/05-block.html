<script src="https://unpkg.com/feather-icons"></script>
<script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

<style>
/* БАЗА */
.auto-container, .auto-container * { box-sizing: border-box; font-family: 'TildaSans', Arial, sans-serif !important; user-select: none; }

/* ТРЕК */
.auto-scroll-track { width: 100%; height: 200vh; position: relative; z-index: 20; }
.auto-sticky { position: -webkit-sticky; position: sticky; top: 0; width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }

/* ГРУППА */
.auto-group {
    width: 100%; max-width: 1200px; height: 100%;
    display: flex; flex-direction: column; justify-content: center; padding: 20px 20px 20px 80px;
    transform-origin: center center; will-change: transform, opacity, filter;
    position: relative;
}
@media (max-width: 900px) { .auto-group { padding: 20px; } }

/* ЗАГОЛОВОК */
.auto-header { position: absolute; top: 80px; left: 80px; display: flex; align-items: baseline; gap: 15px; z-index: 10; }
.auto-title-main { font-size: 42px; font-weight: 700; opacity: 0.3; color: #fff; }
.auto-divider { font-size: 42px; font-weight: 300; opacity: 0.3; color: #fff; }
.auto-title-sub { font-size: 42px; font-weight: 700; color: #fff; }
body.light-mode .auto-title-main, body.light-mode .auto-divider, body.light-mode .auto-title-sub { color: #222; }
@media (max-width: 900px) { .auto-header { left: 20px; top: 60px; font-size: 28px; flex-direction: column; gap: 5px; } .title-divider { display: none; } }

/* ИГРОВОЕ ПОЛЕ */
.builder-area {
    position: relative; width: 100%; height: 600px;
    background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 40px 40px;
    border-radius: 30px; border: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; 
}
body.light-mode .builder-area { background-image: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 1px); border-color: rgba(0,0,0,0.1); }

/* ЛОГИ (ЛЕНТА СВЕРХУ, ТОЛЬКО СПРАВА ПРОЗРАЧНОСТЬ) */
.logs-tape {
    position: absolute; top: 0; left: 0; width: 100%;
    padding: 10px 20px; 
    display: flex; flex-direction: row; align-items: center; gap: 15px; 
    overflow-x: auto; z-index: 25; pointer-events: auto;
    /* Маска только справа */
    -webkit-mask-image: linear-gradient(to right, black 90%, transparent 100%);
    mask-image: linear-gradient(to right, black 90%, transparent 100%);
}
.logs-tape::-webkit-scrollbar { display: none; }

.log-card {
    min-width: 250px; flex-shrink: 0;
    background: rgba(30,30,30,0.9); backdrop-filter: blur(10px);
    border-left: 3px solid #01f7f6; border-radius: 8px;
    padding: 12px; font-size: 12px; color: #fff;
    animation: slideInLeft 0.4s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}
@keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
.log-item.error { border-color: #ff4444; background: rgba(50, 20, 20, 0.9); }
.log-item.error .log-title { color: #ff4444; }
.log-title { color: #01f7f6; font-weight: 700; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; font-size: 13px; }
.log-desc { opacity: 0.9; font-size: 11px; line-height: 1.3; color: #ddd; }

/* ЦЕНТР (0,0) */
.center-point { position: absolute; top: 50%; left: 50%; width: 0; height: 0; }

/* ЯДРО */
.core-node {
    width: 160px; height: 160px; border-radius: 50%;
    background: rgba(30, 30, 30, 0.8); border: 2px solid #555;
    backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: absolute; top: 0; left: 0; transform: translate(-50%, -50%);
    z-index: 10;
    box-shadow: 0 0 50px rgba(0,0,0,0.5); transition: 0.3s;
}
body.light-mode .core-node { background: rgba(255,255,255,0.9); border-color: #ddd; color: #222; }
.core-label { font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; }
.core-score { font-size: 32px; font-weight: 700; color: #fff; margin-top: 5px; }
body.light-mode .core-score { color: #222; }

/* ЗОНА СБРОСА */
.drop-zone {
    position: absolute; top: 0; left: 0; transform: translate(-50%, -50%);
    width: 300px; height: 300px; border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.1); pointer-events: none; transition: 0.3s;
}
.drop-zone.active { border-color: #01f7f6; background: rgba(1, 247, 246, 0.05); transform: translate(-50%, -50%) scale(1.1); }

/* ПАНЕЛЬ ИНСТРУМЕНТОВ */
.tools-panel {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 15px; padding: 15px 25px;
    background: rgba(30,30,30,0.8); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
    z-index: 30; overflow-x: auto; max-width: 90%;
    scrollbar-width: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.tools-panel::-webkit-scrollbar { display: none; }
body.light-mode .tools-panel { background: rgba(255,255,255,0.8); border-color: rgba(0,0,0,0.1); }

/* МОДУЛИ */
.module-card {
    width: 70px; height: 70px; flex-shrink: 0;
    background: rgba(40,40,40,0.9); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; cursor: grab;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2); 
    touch-action: none; z-index: 40;
    transition: transform 0.1s;
}
body.light-mode .module-card { background: #fff; border-color: rgba(0,0,0,0.1); color: #222; }
.module-card:active { cursor: grabbing; transform: scale(1.1); z-index: 100; }
.mod-icon { width: 24px; height: 24px; color: #ccc; }
.mod-label { font-size: 10px; font-weight: 600; color: #fff; text-align: center; line-height: 1.1; }
body.light-mode .mod-icon { color: #555; } body.light-mode .mod-label { color: #222; }

/* ПОДКЛЮЧЕННЫЙ МОДУЛЬ */
.module-card.connected {
    position: absolute;
    border-color: #01f7f6; box-shadow: 0 0 20px rgba(1, 247, 246, 0.4);
    cursor: grab; /* Можно схватить и убрать */
    z-index: 15;
    margin-left: -35px; margin-top: -35px; 
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.module-card.connected .mod-icon { color: #01f7f6; }

/* АВАРИЯ (Пульсация на месте) */
.module-card.error { border-color: #ff4444; box-shadow: 0 0 20px rgba(255, 68, 68, 0.6); animation: pulseError 1s infinite; cursor: pointer; }
.module-card.error .mod-icon { color: #ff4444; }
@keyframes pulseError { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

/* ЛИНИИ (НИТИ) */
.connections-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; overflow: visible; }
.connection-line { stroke: #01f7f6; stroke-width: 1; /* Тонкая нить */ opacity: 0; transition: opacity 0.5s, stroke 0.3s; stroke-dasharray: 1000; stroke-dashoffset: 1000; }
.connection-line.visible { opacity: 0.6; animation: drawLine 1s forwards; }
.connection-line.error { stroke: #ff4444; stroke-dasharray: 5 5; animation: dashError 0.5s linear infinite; opacity: 1; }
@keyframes drawLine { to { stroke-dashoffset: 0; } }
@keyframes dashError { to { stroke-dashoffset: -10; } }

/* РУКА */
.tutorial-hand {
    position: absolute; width: 40px; height: 40px;
    background: url('https://img.icons8.com/ios-filled/50/ffffff/hand-cursor.png') no-repeat center/contain;
    filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
    z-index: 200; pointer-events: none; opacity: 0;
    margin-left: -20px; margin-top: -20px;
}
.tutorial-hand.animate { animation: dragDemo 3s infinite; opacity: 1; }
@keyframes dragDemo {
    0% { transform: translate(0, 200px); opacity: 0; } 
    20% { opacity: 1; transform: translate(0, 200px) scale(0.9); } 
    60% { transform: translate(0, 0); } 
    80% { opacity: 0; }
    100% { opacity: 0; }
}

/* ФИНАЛ */
.final-cta {
    position: absolute; bottom: 140px; left: 50%; transform: translate(-50%, 20px);
    padding: 15px 40px; background: #01f7f6; color: #000; border-radius: 50px;
    font-weight: 700; text-decoration: none; font-size: 16px;
    opacity: 0; transition: 0.5s; pointer-events: none; z-index: 100;
    box-shadow: 0 0 30px rgba(1,247,246,0.4); white-space: nowrap;
}
.final-cta.visible { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
.final-cta:hover { background: #fff; transform: translate(-50%, 0) scale(1.05); }

/* POPUP ОШИБКИ */
.error-popup {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
    z-index: 99999; display: none; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.3s;
}
.error-popup.visible { display: flex; opacity: 1; }
.error-content {
    background: #1a1a1a; border: 1px solid #ff4444; border-radius: 20px;
    padding: 30px; width: 90%; max-width: 400px; text-align: center;
    box-shadow: 0 20px 50px rgba(255, 68, 68, 0.2);
}
.err-title { font-size: 20px; font-weight: 700; color: #ff4444; margin-bottom: 10px; }
.err-text { font-size: 14px; color: #ccc; margin-bottom: 20px; line-height: 1.5; }
.err-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; margin-bottom: 20px; }
.err-btn { padding: 12px 30px; background: #ff4444; color: #fff; border: none; border-radius: 30px; cursor: pointer; font-weight: 700; }

@media (max-width: 900px) {
    .auto-scroll-track { height: auto; }
    .auto-sticky { position: relative; height: auto; display: block; overflow: visible; padding: 100px 0; }
    .builder-area { height: 500px; margin: 0 10px; }
    .tools-panel { bottom: 10px; max-width: 95%; padding: 10px; gap: 8px; justify-content: flex-start; }
    .module-card { width: 60px; height: 60px; }
    .mod-label { display: none; }
    .final-cta { bottom: 100px; }
}
</style>

<div class="auto-container">
    <div class="auto-scroll-track js-auto-track">
        <div class="auto-sticky">
            <div id="automation" style="position: absolute; top: -100px;"></div>
            <div class="auto-group js-auto-anim">
                
                <div class="auto-header">
                    <span class="auto-title-main">Автоматизация</span>
                    <span class="auto-divider">/</span>
                    <span class="auto-title-sub">Конструктор системы</span>
                </div>

                <div class="builder-area" id="builder-area">
                    <!-- ЛОГИ (СВЕРХУ) -->
                    <div class="logs-tape" id="logs-tape"></div>

                    <svg class="connections-svg" id="connections-layer"></svg>
                    
                    <!-- ЦЕНТРАЛЬНАЯ ТОЧКА (0,0) -->
                    <div class="center-point">
                        <div class="drop-zone" id="core-zone"></div>
                        
                        <div class="core-node" id="core">
                            <i data-feather="cpu" class="core-icon" style="width:40px;height:40px;"></i>
                            <div class="core-label">Эффективность</div>

                        </div>
                        
                        <div class="tutorial-hand animate" id="hand-hint"></div>
                    </div>
                </div>

                <!-- ПАНЕЛЬ -->
                <div class="tools-panel" id="tools-panel">
                    <div class="module-card draggable" data-id="1" data-val="12" data-title="CRM" data-items="Клиентская база, История сделок, Напоминания"><i data-feather="users" class="mod-icon"></i><span class="mod-label">CRM</span></div>
                    <div class="module-card draggable" data-id="2" data-val="12" data-title="Чат-бот" data-items="Ответы 24/7, Прогрев лидов, Рассылки"><i data-feather="message-circle" class="mod-icon"></i><span class="mod-label">Чат-бот</span></div>
                    <div class="module-card draggable" data-id="3" data-val="12" data-title="Аналитика" data-items="ROI рекламы, Стоимость лида, Конверсия"><i data-feather="bar-chart-2" class="mod-icon"></i><span class="mod-label">Аналитика</span></div>
                    <div class="module-card draggable" data-id="4" data-val="12" data-title="Авто-продажи" data-items="Генерация счетов, Авто-оплата, Дожимы"><i data-feather="shopping-cart" class="mod-icon"></i><span class="mod-label">Авто-продажи</span></div>
                    <div class="module-card draggable" data-id="5" data-val="12" data-title="Документы" data-items="Авто-договоры, Акты, Счета"><i data-feather="file-text" class="mod-icon"></i><span class="mod-label">Документы</span></div>
                    <div class="module-card draggable" data-id="6" data-val="12" data-title="Телефония" data-items="Запись звонков, Карточка клиента, Статистика"><i data-feather="phone" class="mod-icon"></i><span class="mod-label">Телефония</span></div>
                    <div class="module-card draggable" data-id="7" data-val="14" data-title="HR-бот" data-items="Сбор резюме, Авто-интервью, Тестирование"><i data-feather="user-plus" class="mod-icon"></i><span class="mod-label">HR-бот</span></div>
                    <div class="module-card draggable" data-id="8" data-val="14" data-title="Финансы" data-items="P&L отчет, CashFlow, Контроль расходов"><i data-feather="dollar-sign" class="mod-icon"></i><span class="mod-label">Финансы</span></div>
                </div>

                <a href="#login" class="final-cta" id="final-cta">Внедрить эту систему</a>

            </div>
        </div>
    </div>
</div>

<!-- POPUP -->
<div class="error-popup" id="err-popup">
    <div class="error-content">
        <div class="err-title"><i data-feather="alert-triangle"></i> Сбой подключения</div>
        <div class="err-text">API ключ Telegram устарел. Для восстановления введите новый токен из BotFather.<br><a href="#" style="color:#01f7f6">Инструкция по получению токена</a></div>
        <input type="text" class="err-input" placeholder="Введите API Token">
        <button class="err-btn" onclick="window.fixError()">Восстановить связь</button>
    </div>
</div>

<script>
feather.replace();

document.addEventListener("DOMContentLoaded", function() {
    
    var area = document.getElementById('builder-area');
    var svg = document.getElementById('connections-layer');
    var core = document.getElementById('core');
    var coreZone = document.getElementById('core-zone');
    var scoreEl = document.getElementById('core-score');
    var cta = document.getElementById('final-cta');
    var logsTape = document.getElementById('logs-tape');
    var hand = document.getElementById('hand-hint');
    var toolsPanel = document.getElementById('tools-panel');
    var errPopup = document.getElementById('err-popup');
    
    var currentScore = 0;
    var connectedRadius = 140; 
    var connectedCount = 0;
    var brokenMod = null;

    function initPositions() {
        var firstMod = toolsPanel.firstElementChild;
        if(firstMod) {
            var rect = firstMod.getBoundingClientRect();
            var areaRect = area.getBoundingClientRect();
            var x = (rect.left + rect.width/2) - (areaRect.left + areaRect.width/2);
            var y = (rect.top + rect.height/2) - (areaRect.top + areaRect.height/2);
            hand.style.transform = `translate(${x}px, ${y - 60}px)`;
        }
    }
    
    setTimeout(initPositions, 500);
    window.addEventListener('resize', initPositions);

    // DRAG
    interact('.draggable').draggable({
        listeners: {
            start(event) {
                hand.style.display = 'none';
                
                var target = event.target;
                
                // Перенос в поле
                if (!target.parentElement.classList.contains('center-point')) {
                    var rect = target.getBoundingClientRect();
                    var areaRect = area.getBoundingClientRect();
                    var cx = areaRect.width / 2;
                    var cy = areaRect.height / 2;
                    var x = (event.clientX - areaRect.left) - cx - (rect.width/2);
                    var y = (event.clientY - areaRect.top) - cy - (rect.height/2);
                    
                    document.querySelector('.center-point').appendChild(target);
                    target.style.position = 'absolute';
                    target.style.left = '50%'; target.style.top = '50%';
                    target.style.marginLeft = '-35px'; target.style.marginTop = '-35px';
                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.dataset.x = x; target.dataset.y = y;
                }
            },
            move (event) {
                var target = event.target;
                if (target.classList.contains('connected')) return;

                var x = (parseFloat(target.dataset.x) || 0) + event.dx;
                var y = (parseFloat(target.dataset.y) || 0) + event.dy;

                target.style.transform = `translate(${x}px, ${y}px)`;
                target.dataset.x = x;
                target.dataset.y = y;
            }
        }
    });

    // DROP
    interact('#core-zone').dropzone({
        accept: '.draggable',
        overlap: 0.20,
        ondragenter: function () { coreZone.classList.add('active'); },
        ondragleave: function () { coreZone.classList.remove('active'); },
        ondrop: function (event) {
            var mod = event.relatedTarget;
            
            // Если пытаемся вернуть модуль ВНИЗ (в панель)
            var areaRect = area.getBoundingClientRect();
            var modRect = mod.getBoundingClientRect();
            // Если модуль ниже середины поля + 200px (близко к панели)
            if(modRect.top > areaRect.bottom - 100) {
                removeModule(mod);
                return;
            }

            if (mod.classList.contains('connected')) return;
            
            connectedCount++;
            var totalSlots = 8;
            var angle = ((connectedCount - 1) / totalSlots) * 2 * Math.PI;
            
            var tx = connectedRadius * Math.cos(angle);
            var ty = connectedRadius * Math.sin(angle);
            
            mod.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
            mod.style.transform = `translate(${tx}px, ${ty}px)`;
            mod.dataset.x = tx; mod.dataset.y = ty;
            
            setTimeout(() => { mod.style.transition = ''; }, 500);

            mod.classList.add('connected');
            coreZone.classList.remove('active');
            
            var lineId = "line-" + mod.getAttribute('data-id');
            var line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("class", "connection-line visible");
            line.setAttribute("id", lineId);
            svg.appendChild(line);
            
            setTimeout(() => { updateLine(mod, line); }, 100);
            
            addLog(mod.getAttribute('data-title'), mod.getAttribute('data-items'));
            
            var val = parseInt(mod.getAttribute('data-val'));
            animateScore(currentScore + val);
            currentScore += val;
            if(currentScore > 100) currentScore = 100;
            
            if(currentScore > 40) {
                core.style.borderColor = '#01f7f6';
                core.style.boxShadow = '0 0 50px rgba(1, 247, 246, 0.2)';
                document.querySelector('.core-icon').style.color = '#01f7f6';
            }
            if(currentScore >= 90) cta.classList.add('visible');
            
            if(mod.getAttribute('data-id') === "2") {
                setTimeout(function() { triggerError(mod, lineId); }, 5000);
            }
        }
    });
    
    // ОТКЛЮЧЕНИЕ ПРИ ПЕРЕТАСКИВАНИИ ОБРАТНО
    // Реализовано в move/end событиях, если модуль утащили далеко
    interact('.connected').draggable({
        listeners: {
            move(event) {
                // Если тащим подключенный модуль
                var target = event.target;
                // Считаем дистанцию от центра
                var x = (parseFloat(target.dataset.x) || 0) + event.dx;
                var y = (parseFloat(target.dataset.y) || 0) + event.dy;
                var dist = Math.sqrt(x*x + y*y);
                
                target.style.transform = `translate(${x}px, ${y}px)`;
                target.dataset.x = x; target.dataset.y = y;
                
                // Если утащили далеко (больше 250px) - отключаем
                if(dist > 250) {
                    removeModule(target);
                } else {
                    updateLine(target);
                }
            }
        }
    });
    
    function removeModule(mod) {
        mod.classList.remove('connected');
        mod.classList.add('draggable');
        
        // Удаляем линию
        var lineId = "line-" + mod.getAttribute('data-id');
        var line = document.getElementById(lineId);
        if(line) line.remove();
        
        // Возвращаем в панель
        toolsPanel.appendChild(mod);
        mod.style.position = 'relative';
        mod.style.left = 'auto'; mod.style.top = 'auto';
        mod.style.transform = 'none';
        mod.style.marginLeft = '0'; mod.style.marginTop = '0';
        
        // Вычитаем счет
        var val = parseInt(mod.getAttribute('data-val'));
        currentScore -= val;
        animateScore(currentScore);
        connectedCount--;
    }

    function updateLine(mod, lineEl) {
        var line = lineEl || document.getElementById("line-" + mod.getAttribute('data-id'));
        if(!line) return;
        var cx = area.offsetWidth / 2; var cy = area.offsetHeight / 2;
        var mx = parseFloat(mod.dataset.x); var my = parseFloat(mod.dataset.y);
        line.setAttribute('x1', cx); line.setAttribute('y1', cy);
        line.setAttribute('x2', cx + mx); line.setAttribute('y2', cy + my);
    }
    
    function addLog(title, itemsStr) {
        var items = itemsStr.split(',');
        var listHtml = items.map(i => `<div class="log-row">▪ ${i.trim()}</div>`).join('');
        var item = document.createElement('div');
        item.className = 'log-card';
        item.innerHTML = `<div class="log-title"><i data-feather="check-circle" style="width:14px;"></i> ${title}</div><div class="log-desc">${listHtml}</div>`;
        logsTape.prepend(item);
        feather.replace();
    }
    
    function triggerError(mod, lineId) {
        brokenMod = { mod: mod, line: document.getElementById(lineId) };
        mod.classList.add('error');
        if(brokenMod.line) brokenMod.line.classList.add('error');
        
        mod.addEventListener('click', openErr);
        
        var item = document.createElement('div');
        item.className = 'log-card';
        item.style.borderColor = '#ff4444';
        item.innerHTML = `<div class="log-title" style="color:#ff4444"><i data-feather="alert-triangle" style="width:14px;"></i> Ошибка API</div><div class="log-desc">Нет связи. Нажмите на модуль.</div>`;
        logsTape.prepend(item);
        feather.replace();
    }
    
    function openErr() { errPopup.classList.add('visible'); }
    
    window.fixError = function() {
        errPopup.classList.remove('visible');
        if(brokenMod) {
            brokenMod.mod.classList.remove('error');
            brokenMod.mod.removeEventListener('click', openErr);
            if(brokenMod.line) brokenMod.line.classList.remove('error');
            var fixItem = document.createElement('div');
            fixItem.className = 'log-card';
            fixItem.innerHTML = `<div class="log-title"><i data-feather="refresh-cw" style="width:14px;"></i> System</div><div class="log-desc">Связь восстановлена.</div>`;
            logsTape.prepend(fixItem);
            feather.replace();
        }
    };
    
    function animateScore(target) {
        var el = scoreEl;
        var current = parseInt(el.innerText);
        var timer = setInterval(function() {
            if(current < target) current++; else current--;
            el.innerText = current + '%';
            if (current === target) clearInterval(timer);
        }, 20);
    }

    var track = document.querySelector('.js-auto-track');
    var group = document.querySelector('.js-auto-anim');
    window.addEventListener('scroll', function() {
        if(window.innerWidth <= 960) return;
        var rect = track.getBoundingClientRect();
        if (rect.top <= 0) {
            var dist = rect.height - window.innerHeight;
            if (dist > 0) {
                var p = Math.abs(rect.top) / dist;
                var effP = (p > 0.2) ? (p - 0.2) / 0.8 : 0;
                if(effP > 1) effP = 1;
                group.style.transform = `scale(${1 + effP * 0.2})`;
                group.style.opacity = 1 - effP;
                group.style.filter = `blur(${effP * 20}px)`;
            }
        } else {
            group.style.transform = 'scale(1)'; group.style.opacity = 1; group.style.filter = 'blur(0px)';
        }
    });
});
</script>
